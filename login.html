<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia nhập | PTNN Capybara</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;

    /* CAPYBARA STYLE */
    background: linear-gradient(-45deg, #2b1d16, #3b2a22, #1f1a18, #4a3428);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* floating glow */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255, 220, 180, 0.08);
    filter: blur(80px);
    top: -100px;
    left: -100px;
    border-radius: 50%;
}

.login-card {
    position: relative;
    width: 420px;
    padding: 40px;
    border-radius: 25px;

    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    text-align: center;
    animation: pop 0.6s ease;
}

@keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.logo-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #ffe6c7;
    margin-bottom: 10px;
}

/* tabs */
.auth-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
}

.tab-item {
    padding: 6px 12px;
    font-size: 13px;
    color: #cbb6a2;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: 0.3s;
}

.tab-item.active {
    color: #ffd6a5;
    border-bottom: 2px solid #ffd6a5;
}

/* inputs */
.input-group {
    position: relative;
    margin-bottom: 14px;
}

.input-group i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #b99b85;
}

.input-group input {
    width: 100%;
    padding: 12px 15px 12px 42px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);

    background: rgba(0,0,0,0.25);
    color: white;

    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #ffd6a5;
    box-shadow: 0 0 15px rgba(255,214,165,0.2);
}

/* button */
.btn-submit {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;

    background: linear-gradient(135deg, #ffd6a5, #ffb86b);
    color: #2b1d16;
    font-weight: 700;

    cursor: pointer;
    transition: 0.3s;
}

.btn-submit:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 200, 150, 0.3);
}

/* footer */
.footer-note {
    margin-top: 20px;
    font-size: 11px;
    color: #a48f7d;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="login-card">
    <div class="logo-text">🐹 PTNN Capybara Login</div>

    <div class="auth-tabs">
        <span id="tab-login" class="tab-item active" onclick="toggleMode('login')">ĐĂNG NHẬP</span>
        <span id="tab-signup" class="tab-item" onclick="toggleMode('signup')">ĐĂNG KÝ</span>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input id="username" type="text" placeholder="Tên đăng nhập">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input id="password" type="password" placeholder="Mật khẩu">
        </div>

        <button class="btn-submit" onclick="checkLogin()">Vào thế giới Capybara 🎧</button>
    </div>

    <!-- SIGNUP -->
    <div id="signup-form" class="hidden">
        <div class="input-group">
            <i class="fas fa-user-plus"></i>
            <input id="reg-user" type="text" placeholder="Tên tài khoản">
        </div>

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input id="reg-email" type="email" placeholder="Email">
        </div>

        <div class="input-group">
            <i class="fas fa-key"></i>
            <input id="reg-pass" type="password" placeholder="Mật khẩu">
        </div>

        <button class="btn-submit" onclick="handleSignup()">Tạo tài khoản 🐾</button>
    </div>

    <div class="footer-note">
        Music With You Everyday! • Capybara PTNN
    </div>
</div>

<script>
function toggleMode(mode){
    document.getElementById('login-form').classList.toggle('hidden', mode!=='login');
    document.getElementById('signup-form').classList.toggle('hidden', mode!=='signup');

    document.getElementById('tab-login').classList.toggle('active', mode==='login');
    document.getElementById('tab-signup').classList.toggle('active', mode==='signup');
}
</script>

<script src="auth.js"></script>

</body>
</html>
