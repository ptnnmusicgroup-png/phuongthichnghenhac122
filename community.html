<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PTNN Community</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#f5e6d3,#e8c9a8,#d7bfae,#c49a6c);
            color:#3b2f2f;
        }

        .wrapper{
            display:flex;
            height:100vh;
            width:100vw;
        }

        .sidebar{
            width:260px;
            background: rgba(78,52,46,0.95);
            padding:20px;
            display:flex;
            flex-direction:column;
            color:#fff;
        }

        .sidebar h3{
            font-size:14px;
            margin-bottom:20px;
            line-height:1.4;
            font-weight:600;
        }

        .sidebar a{
            color:#f5e6d3;
            text-decoration:none;
            padding:10px 12px;
            margin:5px 0;
            border-radius:10px;
            transition:0.3s;
            font-weight:500;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,0.1);
            transform:translateX(5px);
        }

        .sidebar a.active{
            background:#e6b98a;
            color:#2b1b14;
            font-weight:700;
        }

        .main{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .header{
            height:60px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
            background:#4e342e;
            color:#ffe8c2;
        }

        .btn-group{
            display:flex;
            gap:10px;
        }

        .btn{
            padding:10px 18px;
            border-radius:999px;
            text-decoration:none;
            font-weight:700;
            background:linear-gradient(135deg,#f6d365,#fda085);
            color:#3b2f2f;
            transition:0.3s;
        }

        .btn-signup{
            background:linear-gradient(135deg,#8d6e63,#a1887f);
            color:#fff;
        }

        .content{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .banner{
            background:rgba(0,0,0,0.65);
            color:#fff;
            padding:30px;
            border-radius:18px;
            text-align:center;
            font-size:22px;
            font-weight:700;
            margin-bottom:20px;
        }

        .section{
            background:#fff3e0;
            padding:15px;
            border-radius:15px;
            margin-bottom:15px;
        }

        textarea{
            width:100%;
            border:none;
            outline:none;
            background:transparent;
            resize:none;
            font-size:14px;
            min-height:70px;
        }

        button{
            margin-top:10px;
            padding:8px 14px;
            border:none;
            border-radius:999px;
            background:linear-gradient(135deg,#c49a6c,#e6b98a);
            font-weight:700;
            cursor:pointer;
        }

        .post, .comment{
            background:#fff3e0;
            padding:15px;
            border-radius:15px;
            margin-bottom:10px;
        }

        .user{
            font-weight:700;
            margin-bottom:5px;
        }

        .text{
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="sidebar">
        <h3>🐹 Phương Thích Nghe Nhạc - Music With You Everyday!</h3>
        <a href="index.html">Home</a>
        <a href="social_medias.html">PTNN's Social medias</a>
        <a class="active" href="community.html">Community</a>
        <a href="store.html">Store</a>
        <a href="about.html">About</a>
    </div>

    <div class="main">

        <div class="header">
            <div>Music Notebook - Love Capybara</div>
            <div class="btn-group">
                <a class="btn" href="login.html">Login</a>
                <a class="btn btn-signup" href="signup.html">Sign Up</a>
            </div>
        </div>

        <div class="content">
            <div class="banner">Community 🎧</div>

            <div id="adminPostBox" class="section" style="display:none;">
                <textarea id="postInput" placeholder="Admin đăng bài..."></textarea>
                <button onclick="addPost()">Post</button>
            </div>

            <div id="postList"></div>

            <div class="section">
                <textarea id="commentInput" placeholder="Viết bình luận... 🎶"></textarea>
                <button onclick="addComment()">Comment</button>
            </div>

            <div id="commentList"></div>
        </div>

    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDrP7EDpobn0oZkcJ_YmGXt8p2FwgEnmFA",
    authDomain: "ptnnweb.firebaseapp.com",
    projectId: "ptnnweb",
    storageBucket: "ptnnweb.firebasestorage.app",
    messagingSenderId: "243477179552",
    appId: "1:243477179552:web:d745a970af7df99e82adc5",
    measurementId: "G-YE13HQVGRN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const session = JSON.parse(localStorage.getItem('userSession')) || {};
  const isAdmin = session.role === "admin";

  if(isAdmin){
    document.getElementById('adminPostBox').style.display = 'block';
  }

  const postRef = ref(db, "posts");
  const commentRef = ref(db, "comments");

  onValue(postRef, (snap) => {
    const data = snap.val() || {};
    const list = document.getElementById("postList");
    list.innerHTML = "";

    Object.values(data).reverse().forEach(p => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `<div class=\"user\">${p.author}</div><div class=\"text\">${p.text}</div>`;
      list.appendChild(div);
    });
  });

  onValue(commentRef, (snap) => {
    const data = snap.val() || {};
    const list = document.getElementById("commentList");
    list.innerHTML = "";

    Object.values(data).reverse().forEach(c => {
      const div = document.createElement("div");
      div.className = "comment";
      div.innerHTML = `<div class=\"user\">${c.user}</div><div class=\"text\">${c.text}</div>`;
      list.appendChild(div);
    });
  });

  window.addPost = function(){
    const input = document.getElementById("postInput");
    if(!input.value.trim()) return;

    push(postRef, {
      author: "Admin",
      text: input.value
    });

    input.value = "";
  }

  window.addComment = function(){
    const input = document.getElementById("commentInput");
    if(!input.value.trim()) return;

    push(commentRef, {
      user: session.name || "guest",
      text: input.value
    });

    input.value = "";
  }
</script>

</body>
</html>
