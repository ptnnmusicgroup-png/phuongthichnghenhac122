<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký | PTNN Capybara</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;

    background: linear-gradient(-45deg, #2b1d16, #3b2a22, #1f1a18, #4a3428);
    background-size: 400% 400%;
    animation: bg 12s ease infinite;
}

@keyframes bg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255, 220, 180, 0.08);
    filter: blur(80px);
    top: -100px;
    left: -100px;
    border-radius: 50%;
}

.card {
    width: 420px;
    padding: 40px;
    border-radius: 25px;

    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    text-align: center;
}

.logo {
    font-size: 20px;
    font-weight: 700;
    color: #ffe6c7;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 14px;
}

.input-group i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #b99b85;
}

.input-group input {
    width: 100%;
    padding: 12px 15px 12px 42px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.25);
    color: white;
    outline: none;
}

.input-group input:focus {
    border-color: #ffd6a5;
    box-shadow: 0 0 15px rgba(255,214,165,0.2);
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;

    background: linear-gradient(135deg, #ffd6a5, #ffb86b);
    color: #2b1d16;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.link {
    margin-top: 15px;
    font-size: 12px;
    color: #cbb6a2;
}

.link a {
    color: #ffd6a5;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">🐹 PTNN Capybara Sign Up</div>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input id="reg-user" type="text" placeholder="Tên tài khoản">
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input id="reg-email" type="email" placeholder="Email">
    </div>

    <div class="input-group">
        <i class="fas fa-key"></i>
        <input id="reg-pass" type="password" placeholder="Mật khẩu">
    </div>

    <button class="btn" onclick="handleSignup()">Tạo tài khoản 🐾</button>

    <div class="link">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
</div>

<script src="auth.js"></script>

</body>
</html>
